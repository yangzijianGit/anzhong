openapi: 3.0.3
info:
  title: 《暗室》Anzhong Game API
  version: 1.0.0
  description: |
    《暗室》(Anzhong) 是一款无战斗 2D 房间解谜游戏。本 API 覆盖 3 章节 19 房间的
    会话、房间、槽位、存档、排行榜、设置、跨平台同步全部数据流。

    设计原则：
    - RESTful + JSON
    - 无状态 (Stateless)
    - 版本化 URL（`/api/v{major}/...`）
    - 一致错误响应（4xx/5xx + errorCode 字段）
    - 限流前置（60 req/min 客户端 + 1000 req/h 用户 + burst 10 req/s）
    - 鉴权分层（JWT + 平台 OAuth + 设备 ID）

    关联文档：design/api/README.md, design/api/endpoints.md, design/api/data-models.md

    **GDD 引用：**
    - 02-core-mechanics-v2.md (SwitchSlot 状态机)
    - 03-level-design-v2.md (19 房间配置)
    - 04-gameplay-flow-v2.md (全局状态机 + SaveSystem)
    - 05-numerical-design-v2.md (5 公式 + 难度上限 20)
    - 06-player-experience-v2.md (无障碍 + 反馈)
    - 07-failure-retry-v2.md (重置)
    - 08-ui-ux-v2.md (HUD + 反馈 3 层)
    - 09-audio-v2.md (9 类音频 dB)
    - 11-release-v2.md (7 平台)

  contact:
    name: 策划总监 (Game Designer Lead)
    email: design@anzhong.example
  license:
    name: Proprietary

servers:
  - url: https://api.anzhong.example/v1
    description: 生产环境 (Production)
  - url: https://staging-api.anzhong.example/v1
    description: 预发布环境 (Staging)
  - url: http://localhost:3000/v1
    description: 本地开发 (Local Dev)

tags:
  - name: session
    description: 游戏会话 (Session lifecycle) — 04 §1.1
  - name: room
    description: 房间 (Room enter/exit/complete) — 03 §5 + 04 §4
  - name: slot
    description: 槽位 (SwitchSlot switch) — 02 §2/§3.1
  - name: save
    description: 存档 (Save / Load) — 04 §10
  - name: leaderboard
    description: 排行榜 (Score + 隐藏成就) — 05 §9.3
  - name: progress
    description: 进度上报 (4 核心指标) — 05 §4.1
  - name: feedback
    description: 玩家反馈 (HUD/教学/Hint) — 08 §7
  - name: settings
    description: 设置 (音频/无障碍) — 09 + 06 §10
  - name: sync
    description: 跨平台同步 (云存档) — 11 §1.1
  - name: telemetry
    description: 遥测事件 (Telemetry) — 05 §4.1
  - name: hint
    description: 渐进式提示 (Hint) — 06 §11.2.1
  - name: chapter
    description: 章节 (Chapter list + 解锁) — 03 §5.2

# 全局安全要求：除 E01-session-start 与公开端点外，全部需 Bearer JWT
security:
  - bearerAuth: []

paths:
  # =========================================================================
  # E01: POST /sessions — 开始游戏会话
  # =========================================================================
  /sessions:
    post:
      tags: [session]
      operationId: startSession
      summary: 开始游戏会话 (E01)
      description: |
        玩家启动游戏时调用，建立一次游戏会话。返回 sessionId 与初始状态。
        与 04 §1.1 全局状态机 MENU → CHAPTER_SELECT 转移对齐。
        关联端点：E02 结束会话。
      security: []  # 公开端点（用设备 ID 即可）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionStartRequest'
            example:
              deviceId: "dev_a1b2c3d4e5f6"
              platform: "steam"
              clientVersion: "1.0.0"
              locale: "zh-CN"
      responses:
        '201':
          description: 会话创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
              example:
                sessionId: "sess_20260629_abc123"
                playerId: "player_x9y8z7"
                startedAt: "2026-06-29T10:00:00Z"
                platform: "steam"
                clientVersion: "1.0.0"
                state: "chapter_select"
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'

  # =========================================================================
  # E02: POST /sessions/{id}/end — 结束会话
  # =========================================================================
  /sessions/{id}/end:
    post:
      tags: [session]
      operationId: endSession
      summary: 结束游戏会话 (E02)
      description: |
        玩家退出游戏时调用，关闭会话、刷新服务端状态、触发 E11 进度上报。
        与 04 §1.1 WIN/PAUSE → MENU 转移对齐。
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionEndRequest'
            example:
              exitReason: "user_quit"
              finalState: "room_playing"
              currentRoomId: "2-3"
      responses:
        '200':
          description: 会话结束成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEndResult'
              example:
                sessionId: "sess_20260629_abc123"
                endedAt: "2026-06-29T11:30:00Z"
                durationSec: 5400
                finalRoomId: "2-3"
                roomsCompleted: 8
                totalResets: 12
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # =========================================================================
  # E03: POST /rooms/{id}/enter — 进入房间
  # =========================================================================
  /rooms/{id}/enter:
    post:
      tags: [room]
      operationId: enterRoom
      summary: 进入房间 (E03)
      description: |
        玩家加载新房间时调用。返回房间配置 + 当前槽位状态。
        与 03 §5 19 房间配置表 + 04 §4 房间内循环对齐。
        **硬约束：** 房间 ID 必须已解锁（章节门控规则见 03 §5.2）。
      parameters:
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomEnterRequest'
            example:
              sessionId: "sess_20260629_abc123"
              timestamp: 1719652800000
      responses:
        '200':
          description: 房间配置 + 初始状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
              example:
                roomId: "1-1"
                name: "第一道光"
                chapterId: "ch1"
                type: "tutorial"
                width: 12
                height: 8
                slots:
                  - slotId: "slot_1_1_a"
                    type: "toggle"
                    currentIndex: 0
                    options: ["floor", "wall"]
                difficulty: 2
                difficultyMax: 20
                targetDurationP50: 60
                targetDurationP90: 180
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # =========================================================================
  # E04: POST /rooms/{id}/exit — 离开房间
  # =========================================================================
  /rooms/{id}/exit:
    post:
      tags: [room]
      operationId: exitRoom
      summary: 离开房间 (E04)
      description: |
        玩家在 Switching 中退出或主动离开时调用。
        与 04 §4.4 房间内循环与章节循环衔接 + 02 §2.4 "玩家在 Switching 中退出"边界对齐。
      parameters:
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomExitRequest'
            example:
              sessionId: "sess_20260629_abc123"
              exitDuring: "switching"
              progressSaved: true
      responses:
        '200':
          description: 离开成功（自动存档）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomExitResult'
              example:
                roomId: "1-1"
                exitAt: "2026-06-29T10:05:00Z"
                savePointId: "sp_ch1_1_1_partial"
                resumeToken: "rtk_xyz789"
        '404':
          $ref: '#/components/responses/NotFound'

  # =========================================================================
  # E05: POST /rooms/{id}/complete — 房间通关
  # =========================================================================
  /rooms/{id}/complete:
    post:
      tags: [room]
      operationId: completeRoom
      summary: 房间通关 (E05)
      description: |
        玩家走到出口、房间通关判定成功时调用。
        触发：04 §4.3 通关判定 + 03 §6 难度曲线奖励 + 06 §4 情感曲线 +1。
      parameters:
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCompleteRequest'
            example:
              sessionId: "sess_20260629_abc123"
              completionTimeSec: 95
              switchCount: 3
              resetCount: 0
              hintsTriggered: 0
      responses:
        '200':
          description: 通关成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomCompleteResult'
              example:
                roomId: "1-1"
                chapterId: "ch1"
                chapterComplete: false
                nextRoomId: "1-2"
                score:
                  steps: 3
                  timeSec: 95
                  hintsUsed: 0
                unlockProgress: 0.053
                achievementUnlocked: []
        '404':
          $ref: '#/components/responses/NotFound'

  # =========================================================================
  # E06: POST /slots/{id}/switch — 切换槽位
  # =========================================================================
  /slots/{id}/switch:
    post:
      tags: [slot]
      operationId: switchSlot
      summary: 切换槽位 (E06)
      description: |
        玩家按 E/Q 切换 SwitchSlot 时调用。
        4 种槽位类型：Toggle / Cycle / Conditional / Locked（02 §3.1）。
        **硬约束：** 客户端 300ms 冷却（02 §3.2 防误触）。
        **ConditionalSlot** 需检查 `dependsOnSlotId` 状态。
      parameters:
        - $ref: '#/components/parameters/SlotId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlotSwitchRequest'
            example:
              sessionId: "sess_20260629_abc123"
              direction: "clockwise"
              clientTimestampMs: 1719652800000
      responses:
        '200':
          description: 切换成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotSwitchResult'
              example:
                slotId: "slot_1_1_a"
                previousIndex: 0
                currentIndex: 1
                newState: "hover"
                animationMs: 200
                audioAsset: "sfx_switch_toggle_01.wav"
        '400':
          description: 切换被拒绝（冷却中 / LockedSlot / ConditionalSlot 依赖不满足）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                cooldown:
                  value:
                    errorCode: "SLOT_COOLDOWN_ACTIVE"
                    message: "Switch cooldown active, retry after 200ms"
                    retryAfterMs: 200
                locked:
                  value:
                    errorCode: "SLOT_LOCKED_DEPENDENCY"
                    message: "ConditionalSlot depends on slot_1_1_b at index 1"
                    dependentSlotId: "slot_1_1_b"

  # =========================================================================
  # E07: POST /rooms/{id}/reset — 重置房间
  # =========================================================================
  /rooms/{id}/reset:
    post:
      tags: [room]
      operationId: resetRoom
      summary: 重置房间 (E07)
      description: |
        玩家按 R 键重置房间时调用。
        与 07 §3 槽位重置规则 + 02 §3.1 R 键 + 07 §3.3 ConditionalSlot 特殊处理对齐。
        **客户端 500ms 冷却**（02 §3.2）+ **服务端 30 次/房间防滥用**（05 §5.3）。
      parameters:
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomResetRequest'
            example:
              sessionId: "sess_20260629_abc123"
              clientTimestampMs: 1719652800000
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResetResult'
              example:
                roomId: "1-1"
                resetCount: 2
                slotsAfterReset:
                  - slotId: "slot_1_1_a"
                    currentIndex: 0
                audioAsset: "sfx_reset_room_01.wav"
        '429':
          description: 触发防滥用阈值（>30 次/房间）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: "RESET_ABUSE_THRESHOLD"
                message: "Reset count exceeds 30 for this room. Take a break or use a hint."
                currentCount: 31
                limit: 30

  # =========================================================================
  # E08: POST /saves — 保存存档
  # =========================================================================
  /saves:
    post:
      tags: [save]
      operationId: saveGame
      summary: 保存存档 (E08)
      description: |
        自动/手动保存玩家进度。
        与 04 §10.1 自动存档时机（房间通关/章节完成/退出）+ §10.4 JSON 存档 + 备份机制对齐。
        **异步写入** ≤ 50ms（不阻塞主循环）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveData'
            example:
              version: "1.0.0"
              lastUpdated: "2026-06-29T10:30:00Z"
              currentChapterId: "ch1"
              currentRoomId: "1-3"
              completedRooms:
                ch1: ["1-1", "1-2"]
                ch2: []
                ch3: []
              chapterCompleted:
                ch1: false
                ch2: false
                ch3: false
              gameCompleted: false
              totalPlayTime: 1800
              totalResets: 5
              roomStats:
                "1-1":
                  attempts: 1
                  resets: 0
                  completionTime: 95
                  hintsTriggered: 0
                "1-2":
                  attempts: 1
                  resets: 1
                  completionTime: 240
                  hintsTriggered: 0
      responses:
        '200':
          description: 存档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveResult'
              example:
                saveId: "save_20260629_103000_player_x9y8z7"
                savedAt: "2026-06-29T10:30:00Z"
                bytesWritten: 2847
                backupId: "save_20260629_103000_player_x9y8z7.bak"
        '507':
          $ref: '#/components/responses/InsufficientStorage'

  # =========================================================================
  # E09: GET /saves/{playerId} — 读取存档
  # =========================================================================
  /saves/{playerId}:
    get:
      tags: [save]
      operationId: loadSave
      summary: 读取存档 (E09)
      description: |
        玩家启动游戏时拉取最近一次存档。
        与 04 §10.3 读档语义对齐（主菜单 → 继续游戏 / 章节选择 / 存档损坏降级）。
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
            example: "player_x9y8z7"
        - name: includeBackup
          in: query
          required: false
          schema:
            type: boolean
            default: false
            description: 是否同时返回 backup 存档（用于迁移/容错）
      responses:
        '200':
          description: 存档读取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveLoadResult'
              example:
                saveData:
                  version: "1.0.0"
                  currentChapterId: "ch1"
                  currentRoomId: "1-3"
                  completedRooms:
                    ch1: ["1-1", "1-2"]
                backupAvailable: true
                backupTimestamp: "2026-06-29T10:25:00Z"
        '404':
          description: 无存档（新玩家或存档损坏已清空）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: "SAVE_NOT_FOUND"
                message: "No save found for player. Starting from Ch1-1."

  # =========================================================================
  # E10: GET /leaderboard — 排行榜
  # =========================================================================
  /leaderboard:
    get:
      tags: [leaderboard]
      operationId: getLeaderboard
      summary: 排行榜 (E10)
      description: |
        查询通关排行榜（按章节 / 难度 / 步数 / 通关时间）。
        关联 05 §9.3 隐藏成就 + 06 §11.3 M3 成就动机。
        **硬约束：** 难度上限 20（05 §5.2）— difficultyMax 参数可筛选。
      parameters:
        - name: chapterId
          in: query
          required: false
          schema:
            type: string
            enum: [ch1, ch2, ch3]
            example: "ch1"
        - name: difficultyMax
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 20
            description: 难度上限（用于筛选 "困难档" 等子榜）
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [steps, timeSec, score, completionDate]
            default: "steps"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 排行榜条目
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResult'
              example:
                chapterId: "ch1"
                difficultyMax: 20
                sortBy: "steps"
                entries:
                  - rank: 1
                    playerId: "player_aaa"
                    displayName: "Aha King"
                    score:
                      steps: 8
                      timeSec: 720
                      hintsUsed: 0
                    completionDate: "2026-06-15T14:30:00Z"
                totalEntries: 1234

  # =========================================================================
  # E11: POST /progress — 进度上报
  # =========================================================================
  /progress:
    post:
      tags: [progress]
      operationId: reportProgress
      summary: 进度上报 (E11)
      description: |
        上报 4 核心指标：P50 停留时长 / P90 停留时长 / R 键次数 / Hint 触发率。
        与 05 §4.1 调参驱动 4 指标 + 06 §9.2 玩家进度数据采集对齐。
        **批量上报：** 一次最多 100 条记录。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgressReportRequest'
            example:
              sessionId: "sess_20260629_abc123"
              reports:
                - roomId: "1-1"
                  p50DurationSec: 95
                  p90DurationSec: 180
                  resetCount: 0
                  hintsTriggered: 0
                  switchCount: 3
                  completed: true
                - roomId: "1-2"
                  p50DurationSec: 240
                  p90DurationSec: 360
                  resetCount: 1
                  hintsTriggered: 0
                  switchCount: 5
                  completed: true
      responses:
        '202':
          description: 上报已接受
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressReportResult'
              example:
                accepted: 2
                rejected: 0
                flagged:
                  - roomId: "1-2"
                    flag: "P90_EXCEEDS_P50_2X"
                    note: "Cardinal point detected (1-2 P90 = 1.5x P50, consider hint threshold)"

  # =========================================================================
  # E12: POST /feedback — 玩家反馈
  # =========================================================================
  /feedback:
    post:
      tags: [feedback]
      operationId: submitFeedback
      summary: 玩家反馈 (E12)
      description: |
        玩家提交反馈（HUD 提示 / 教学 / Hint / 视觉/音效/动效三层同步）。
        与 08 §7 反馈 3 层（视觉/音效/动效）+ 06 §9.2 8 节点对齐。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
            example:
              sessionId: "sess_20260629_abc123"
              roomId: "1-1"
              feedbackType: "visual_layer"
              rating: 4
              comment: "Slot glow is too dim on default"
              clientTimestampMs: 1719652800000
      responses:
        '201':
          description: 反馈已记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResult'
              example:
                feedbackId: "fb_20260629_001"
                recordedAt: "2026-06-29T10:30:00Z"
                triageStatus: "queued"

  # =========================================================================
  # E13: GET/PUT /settings/audio — 音频设置
  # =========================================================================
  /settings/audio:
    get:
      tags: [settings]
      operationId: getAudioSettings
      summary: 读取音频设置 (E13 GET)
      description: |
        读取玩家 9 类音频设置（dB 值）。
        与 09 §1.1 9 类音频资产清单对齐。
      responses:
        '200':
          description: 音频设置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioSettings'
              example:
                masterVolume: 0.8
                switchSfxDb: -12
                resetSfxDb: -18
                winSfxDb: -6
                errorSfxDb: -12
                tutorialSfxDb: -9
                chapterBgmVolume: 0.6
                roomThemeVolume: 0.5
                ambientVolume: 0.4
                uiFeedbackDb: -15
                muted: false
    put:
      tags: [settings]
      operationId: updateAudioSettings
      summary: 更新音频设置 (E13 PUT)
      description: |
        更新玩家 9 类音频设置。
        **dB 越界约束：** 05 §3.4 (切换音 [-18,-6] / 重置音 [-24,-12] / 通关音 [-12,-3] 等)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AudioSettings'
            example:
              masterVolume: 0.7
              switchSfxDb: -14
              resetSfxDb: -20
              winSfxDb: -6
      responses:
        '200':
          description: 设置已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioSettings'
        '400':
          description: dB 越界
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: "AUDIO_DB_OUT_OF_RANGE"
                message: "switchSfxDb must be in [-18, -6] dB"
                field: "switchSfxDb"
                minValue: -18
                maxValue: -6

  # =========================================================================
  # E14: GET/PUT /settings/accessibility — 无障碍设置
  # =========================================================================
  /settings/accessibility:
    get:
      tags: [settings]
      operationId: getAccessibilitySettings
      summary: 读取无障碍设置 (E14 GET)
      description: |
        读取无障碍设置（色盲 3 档 + 字号 3 档 + 控制器 + 难度选项）。
        与 06 §10 (4 类无障碍) + 08 §6 (5 开关) 对齐。
      responses:
        '200':
          description: 无障碍设置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessibilitySettings'
              example:
                colorblindMode: "default"
                fontScale: 1.0
                controllerSupport: "xbox"
                difficulty: "normal"
                highContrast: false
                reducedMotion: false
                screenReader: false
    put:
      tags: [settings]
      operationId: updateAccessibilitySettings
      summary: 更新无障碍设置 (E14 PUT)
      description: |
        更新无障碍设置。
        **色盲模式枚举：** default / red-green / full（06 §10.1）
        **字号枚举：** 1.0 / 1.25 / 1.5（06 §10.2）
        **难度枚举：** easy / normal（v1.0 仅两档，06 §10.4）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessibilitySettings'
      responses:
        '200':
          description: 设置已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessibilitySettings'

  # =========================================================================
  # E15: POST /sync — 跨平台云同步
  # =========================================================================
  /sync:
    post:
      tags: [sync]
      operationId: syncProgress
      summary: 跨平台云同步 (E15)
      description: |
        跨设备云存档同步（Steam / Mac / PS5 / Xbox / Switch / iOS / Android）。
        与 11 §1.1 7 平台覆盖矩阵对齐。
        **冲突解决：** Last-Write-Wins + 服务端时钟优先（详见 README §11 R-03）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncRequest'
            example:
              playerId: "player_x9y8z7"
              sourcePlatform: "steam"
              targetPlatform: "switch"
              saveData:
                version: "1.0.0"
                currentChapterId: "ch2"
                currentRoomId: "2-3"
                completedRooms:
                  ch1: ["1-1","1-2","1-3","1-4","1-5"]
                  ch2: ["2-1","2-2"]
                  ch3: []
              clientTimestampMs: 1719652800000
      responses:
        '200':
          description: 同步成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResult'
              example:
                conflictDetected: false
                resolvedSave:
                  currentChapterId: "ch2"
                  currentRoomId: "2-3"
                lastSyncAt: "2026-06-29T10:30:00Z"
        '409':
          description: 同步冲突（Last-Write-Wins 已应用，本地需提示）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncConflict'
              example:
                conflictDetected: true
                resolution: "server_wins"
                serverTimestamp: "2026-06-29T10:25:00Z"
                clientTimestamp: "2026-06-29T10:20:00Z"
                lostProgress:
                  currentRoomId: "2-4"
                  completedRooms:
                    ch2: ["2-1","2-2","2-3"]

  # =========================================================================
  # E16: POST /telemetry — 遥测事件
  # =========================================================================
  /telemetry:
    post:
      tags: [telemetry]
      operationId: submitTelemetry
      summary: 遥测事件 (E16)
      description: |
        客户端遥测事件批量上报（房间通关 / 槽位切换 / 重置 / Hint / 教学 / 错误）。
        与 05 §4.1 调参驱动 4 指标 + 06 §11 沉浸/心理数据对齐。
        **批量：** 一次最多 500 条。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryRequest'
            example:
              sessionId: "sess_20260629_abc123"
              events:
                - eventType: "room_completed"
                  roomId: "1-1"
                  timestampMs: 1719652800000
                  properties:
                    durationSec: 95
                    switchCount: 3
                    resetCount: 0
                - eventType: "slot_switched"
                  slotId: "slot_1_1_a"
                  timestampMs: 1719652795000
                  properties:
                    type: "toggle"
                    direction: "clockwise"
      responses:
        '202':
          description: 事件已接收
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryResult'
              example:
                received: 2
                deduplicated: 0
                serverTimestamp: "2026-06-29T10:30:00Z"

  # =========================================================================
  # E17: POST /hints — 触发渐进式 Hint
  # =========================================================================
  /hints:
    post:
      tags: [hint]
      operationId: triggerHint
      summary: 触发 Hint (E17)
      description: |
        触发渐进式 Hint（3-5-15 分钟 / Boss 房 20-30 分钟）。
        与 06 §11.2.1 焦虑源缓解 + 03 §10 E1-E5 边界 + 08 §8.3 渐进式 Hint 触发对齐。
        **触发条件：** 教学房 3 分钟空闲 / Boss 房 20 分钟 / 主动请求。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HintRequest'
            example:
              sessionId: "sess_20260629_abc123"
              roomId: "1-1"
              hintLevel: 1
              trigger: "idle_timeout"
              idleDurationSec: 200
      responses:
        '200':
          description: Hint 内容
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HintResult'
              example:
                hintId: "hint_1_1_l1"
                level: 1
                text: "试试走近那个发光的方块，按 E 键"
                visualHint: "slot_pulse_highlight"
                audioAsset: "sfx_tutorial_firstswitch_01.wav"
                expiresAt: "2026-06-29T10:35:00Z"

  # =========================================================================
  # E18: GET /chapters — 章节列表 + 解锁状态
  # =========================================================================
  /chapters:
    get:
      tags: [chapter]
      operationId: listChapters
      summary: 章节列表 (E18)
      description: |
        返回 3 章节元数据 + 当前玩家解锁状态。
        与 03 §5.2 章节门控规则 + 03 §3.2 章节-房间总数对齐。
      responses:
        '200':
          description: 章节列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChapterListResult'
              example:
                chapters:
                  - chapterId: "ch1"
                    name: "觉醒"
                    nameEn: "First Light"
                    roomCount: 5
                    unlocked: true
                    completed: false
                    progressPct: 60.0
                    averageDifficulty: 3.6
                  - chapterId: "ch2"
                    name: "深掘"
                    nameEn: "Deep Dig"
                    roomCount: 6
                    unlocked: false
                    unlockCondition: "Complete Ch1 (5/5 rooms)"
                    completed: false
                    progressPct: 0
                    averageDifficulty: 9.3
                  - chapterId: "ch3"
                    name: "迷途"
                    nameEn: "Lost Path"
                    roomCount: 8
                    unlocked: false
                    unlockCondition: "Complete Ch2 (11/19 rooms total)"
                    completed: false
                    progressPct: 0
                    averageDifficulty: 16

components:
  # ===========================================================================
  # 安全方案
  # ===========================================================================
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Token，签发后 24h 有效。
        - 玩家鉴权：`Authorization: Bearer <jwt>` (sub=playerId)
        - 平台 OAuth：Token 包含 platform claim
        - 设备绑定：Token 包含 deviceId claim（与首次会话设备 ID 匹配）
    platformOAuth:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://api.anzhong.example/oauth/authorize
          tokenUrl: https://api.anzhong.example/oauth/token
          scopes:
            player.profile: 玩家档案读写
            player.progress: 玩家进度读写
            leaderboard.read: 排行榜读取
            leaderboard.write: 排行榜写入（通关后）
            sync.cloud: 跨平台云同步

  # ===========================================================================
  # 公共参数
  # ===========================================================================
  parameters:
    SessionId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: 会话 ID
      example: "sess_20260629_abc123"
    RoomId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: 房间 ID (e.g., "1-1", "2-3", "3-8")
      example: "1-1"
    SlotId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: SwitchSlot ID
      example: "slot_1_1_a"

  # ===========================================================================
  # 公共响应
  # ===========================================================================
  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errorCode: "BAD_REQUEST"
            message: "Invalid request body"
            field: "deviceId"
    Unauthorized:
      description: 未鉴权或 Token 失效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errorCode: "UNAUTHORIZED"
            message: "JWT token expired or invalid"
    Forbidden:
      description: 权限不足（章节未解锁/房间未达成条件）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errorCode: "CHAPTER_LOCKED"
            message: "Chapter 2 requires completing Ch1 (5/5 rooms)"
            currentProgress: "3/5"
            requiredProgress: "5/5"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errorCode: "NOT_FOUND"
            message: "Room not found: 9-9"
    RateLimited:
      description: 限流触发
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errorCode: "RATE_LIMIT_EXCEEDED"
            message: "Too many requests"
            retryAfterMs: 60000
            limit: 60
            windowSec: 60
    InsufficientStorage:
      description: 存档空间不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errorCode: "STORAGE_FULL"
            message: "Save storage limit reached (10 MB)"
            currentBytes: 10485760

  # ===========================================================================
  # 数据模型 (12 Schemas)
  # ===========================================================================
  schemas:
    # ---- M01 Player ----
    Player:
      type: object
      description: 玩家档案 (06 §2)
      required: [playerId, displayName, createdAt]
      properties:
        playerId:
          type: string
          example: "player_x9y8z7"
        displayName:
          type: string
          example: "Aha King"
        platform:
          type: string
          enum: [steam, mac, ps5, xbox, switch, ios, android, anonymous]
          example: "steam"
        locale:
          type: string
          example: "zh-CN"
        createdAt:
          type: string
          format: date-time
        totalPlayTime:
          type: integer
          description: 总游戏时长 (秒)
          example: 1800
        achievementsUnlocked:
          type: array
          items:
            type: string
          example: ["first_aha", "chapter1_complete"]

    # ---- M02 Session ----
    Session:
      type: object
      description: 游戏会话 (04 §1.1)
      required: [sessionId, playerId, startedAt, state]
      properties:
        sessionId:
          type: string
          example: "sess_20260629_abc123"
        playerId:
          type: string
          example: "player_x9y8z7"
        startedAt:
          type: string
          format: date-time
        platform:
          type: string
          example: "steam"
        clientVersion:
          type: string
          example: "1.0.0"
        state:
          type: string
          enum: [menu, chapter_select, room_playing, paused, win, chapter_transition]
          example: "chapter_select"

    SessionStartRequest:
      type: object
      required: [deviceId, platform, clientVersion]
      properties:
        deviceId:
          type: string
          description: 设备唯一标识 (匿名)
          example: "dev_a1b2c3d4e5f6"
        platform:
          type: string
          enum: [steam, mac, ps5, xbox, switch, ios, android]
        clientVersion:
          type: string
          example: "1.0.0"
        locale:
          type: string
          example: "zh-CN"

    SessionEndRequest:
      type: object
      required: [exitReason, finalState]
      properties:
        exitReason:
          type: string
          enum: [user_quit, crash, power_off, force_kill]
        finalState:
          type: string
          enum: [menu, chapter_select, room_playing, paused, win]
        currentRoomId:
          type: string
          example: "2-3"

    SessionEndResult:
      type: object
      properties:
        sessionId:
          type: string
        endedAt:
          type: string
          format: date-time
        durationSec:
          type: integer
          example: 5400
        finalRoomId:
          type: string
        roomsCompleted:
          type: integer
          example: 8
        totalResets:
          type: integer
          example: 12

    # ---- M03 Room ----
    Room:
      type: object
      description: 房间配置 + 状态 (03 §5)
      required: [roomId, name, chapterId, type, width, height, slots, difficulty, difficultyMax]
      properties:
        roomId:
          type: string
          example: "1-1"
        name:
          type: string
          example: "第一道光"
        chapterId:
          type: string
          enum: [ch1, ch2, ch3]
        type:
          type: string
          enum: [tutorial, standard, challenge, boss]
          example: "tutorial"
        width:
          type: integer
          minimum: 4
          maximum: 16
          example: 12
        height:
          type: integer
          minimum: 4
          maximum: 12
          example: 8
        slots:
          type: array
          items:
            $ref: '#/components/schemas/SwitchSlot'
        difficulty:
          type: integer
          minimum: 1
          maximum: 20
          description: |
            房间难度（05 §2.1 F1 公式）。**P0-001 自我保护：** 02-v2 §13 AC-06 缺"难度上限 20"硬约束，
            本字段 `difficultyMax=20` 自我保护，由服务端 `Room.validate()` 静态检查。
          example: 2
        difficultyMax:
          type: integer
          const: 20
          description: |
            难度上限（05 §5.2 硬约束）。**P0-001 跟踪**：02-v2 需同步此硬约束（v1.0 不阻塞实施）。
          example: 20
        targetDurationP50:
          type: integer
          description: P50 停留时长目标（秒，05 §2.3 F3）
          example: 60
        targetDurationP90:
          type: integer
          description: P90 停留时长目标（秒）
          example: 180

    RoomEnterRequest:
      type: object
      required: [sessionId]
      properties:
        sessionId:
          type: string
        timestamp:
          type: integer
          format: int64

    RoomExitRequest:
      type: object
      required: [sessionId]
      properties:
        sessionId:
          type: string
        exitDuring:
          type: string
          enum: [idle, hovering, switching, locked, completed]
        progressSaved:
          type: boolean
          default: true

    RoomExitResult:
      type: object
      properties:
        roomId:
          type: string
        exitAt:
          type: string
          format: date-time
        savePointId:
          type: string
        resumeToken:
          type: string

    RoomCompleteRequest:
      type: object
      required: [sessionId, completionTimeSec]
      properties:
        sessionId:
          type: string
        completionTimeSec:
          type: integer
          example: 95
        switchCount:
          type: integer
          example: 3
        resetCount:
          type: integer
          example: 0
        hintsTriggered:
          type: integer
          example: 0

    RoomCompleteResult:
      type: object
      properties:
        roomId:
          type: string
        chapterId:
          type: string
        chapterComplete:
          type: boolean
        nextRoomId:
          type: string
          nullable: true
          example: "1-2"
        score:
          $ref: '#/components/schemas/Score'
        unlockProgress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: F5 银河恶魔城解锁度
          example: 0.053
        achievementUnlocked:
          type: array
          items:
            type: string
          example: ["first_aha"]

    RoomResetRequest:
      type: object
      required: [sessionId, clientTimestampMs]
      properties:
        sessionId:
          type: string
        clientTimestampMs:
          type: integer
          format: int64

    RoomResetResult:
      type: object
      properties:
        roomId:
          type: string
        resetCount:
          type: integer
          description: 本房间累计重置次数
          example: 2
        slotsAfterReset:
          type: array
          items:
            $ref: '#/components/schemas/SwitchSlot'
        audioAsset:
          type: string
          example: "sfx_reset_room_01.wav"

    # ---- M04 SwitchSlot ----
    SwitchSlot:
      type: object
      description: SwitchSlot 状态 (02 §3.1)
      required: [slotId, type, currentIndex, options, state]
      properties:
        slotId:
          type: string
          example: "slot_1_1_a"
        type:
          type: string
          enum: [toggle, cycle, conditional, locked]
          description: 4 种槽位类型
        currentIndex:
          type: integer
          minimum: 0
          example: 0
        options:
          type: array
          minItems: 2
          maxItems: 4
          items:
            type: string
            enum: [floor, wall, glass_wall, door, crumbling_floor, fake_floor, pressure_plate]
          description: 7 种预制件类型（02 §3.1 + §3.2）
          example: ["floor", "wall"]
        state:
          type: string
          enum: [idle, hover, active, switching, locked]
          description: 5 态状态机 (02 §2.1)
          example: "hover"
        dependsOnSlotId:
          type: string
          description: ConditionalSlot 依赖的另一槽位
          nullable: true
          example: null
        unlockedByState:
          type: array
          items:
            type: integer
          description: 依赖槽位在哪些 currentIndex 时解锁
          example: []
        maxOptionsPerCycle:
          type: integer
          minimum: 2
          maximum: 4
          default: 2
        triggerRadius:
          type: number
          format: float
          minimum: 1.0
          maximum: 3.0
          default: 2.0
          description: Hover 触发的距离（格，05 §3.2）

    SlotSwitchRequest:
      type: object
      required: [sessionId, direction, clientTimestampMs]
      properties:
        sessionId:
          type: string
        direction:
          type: string
          enum: [clockwise, counter_clockwise]
          description: 顺时针 (E) / 逆时针 (Q)
        clientTimestampMs:
          type: integer
          format: int64

    SlotSwitchResult:
      type: object
      properties:
        slotId:
          type: string
        previousIndex:
          type: integer
        currentIndex:
          type: integer
        newState:
          type: string
          enum: [hover, switching, locked]
        animationMs:
          type: integer
          description: 切换动画时长 (02 §3.1 200ms)
          example: 200
        audioAsset:
          type: string
          example: "sfx_switch_toggle_01.wav"

    # ---- M05 Chapter ----
    Chapter:
      type: object
      description: 章节元数据 (03 §3.2)
      required: [chapterId, name, roomCount]
      properties:
        chapterId:
          type: string
          enum: [ch1, ch2, ch3]
        name:
          type: string
          example: "觉醒"
        nameEn:
          type: string
          example: "First Light"
        roomCount:
          type: integer
          enum: [5, 6, 8]
        unlocked:
          type: boolean
        completed:
          type: boolean
        progressPct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          example: 60.0
        averageDifficulty:
          type: number
          format: float
          example: 3.6
        unlockCondition:
          type: string
          nullable: true
          example: "Complete Ch1 (5/5 rooms)"

    ChapterListResult:
      type: object
      properties:
        chapters:
          type: array
          items:
            $ref: '#/components/schemas/Chapter'

    # ---- M06 Progress ----
    Progress:
      type: object
      description: 玩家进度 (05 §2.5 F5 + 06 §9)
      properties:
        playerId:
          type: string
        totalRoomsCompleted:
          type: integer
          example: 8
        totalRooms:
          type: integer
          example: 19
        unlockProgressPct:
          type: number
          format: float
          example: 42.1
        chapterProgress:
          type: object
          additionalProperties:
            type: number
            format: float
          example:
            ch1: 100.0
            ch2: 50.0
            ch3: 0.0
        totalPlayTime:
          type: integer
          example: 5400
        totalResets:
          type: integer
          example: 12
        totalHintsTriggered:
          type: integer
          example: 3

    ProgressReportRequest:
      type: object
      required: [sessionId, reports]
      properties:
        sessionId:
          type: string
        reports:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required: [roomId, p50DurationSec]
            properties:
              roomId:
                type: string
              p50DurationSec:
                type: integer
              p90DurationSec:
                type: integer
              resetCount:
                type: integer
              hintsTriggered:
                type: integer
              switchCount:
                type: integer
              completed:
                type: boolean

    ProgressReportResult:
      type: object
      properties:
        accepted:
          type: integer
        rejected:
          type: integer
        flagged:
          type: array
          items:
            type: object
            properties:
              roomId:
                type: string
              flag:
                type: string
                enum: [P90_EXCEEDS_P50_2X, RESET_EXCEEDS_2X, HINT_TRIGGER_RATE_HIGH]
              note:
                type: string

    # ---- M07 Score ----
    Score:
      type: object
      description: 通关分数 (05 §9.3 + 06 §11.3 M3)
      required: [steps, timeSec]
      properties:
        steps:
          type: integer
          description: 最少步数挑战 (07 §10.2)
          example: 3
        timeSec:
          type: integer
          example: 95
        hintsUsed:
          type: integer
          example: 0
        resetsUsed:
          type: integer
          example: 0
        rank:
          type: string
          enum: [S, A, B, C, D]
          nullable: true
        achievementsTriggered:
          type: array
          items:
            type: string

    # ---- M08 Feedback ----
    Feedback:
      type: object
      description: 玩家反馈事件 (08 §7 反馈 3 层)
      required: [feedbackId, sessionId, feedbackType, recordedAt]
      properties:
        feedbackId:
          type: string
          example: "fb_20260629_001"
        sessionId:
          type: string
        roomId:
          type: string
          nullable: true
        feedbackType:
          type: string
          enum: [visual_layer, audio_layer, motion_layer, hud, tutorial, hint, accessibility, other]
          description: |
            反馈类型对应 08 §7 三层同步：
            - visual_layer / audio_layer / motion_layer = 三层反馈
            - hud / tutorial / hint = 教学反馈
            - accessibility = 无障碍反馈
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        clientTimestampMs:
          type: integer
          format: int64
        recordedAt:
          type: string
          format: date-time
        triageStatus:
          type: string
          enum: [queued, reviewed, actioned, dismissed]

    FeedbackRequest:
      type: object
      required: [sessionId, feedbackType]
      properties:
        sessionId:
          type: string
        roomId:
          type: string
        feedbackType:
          type: string
          enum: [visual_layer, audio_layer, motion_layer, hud, tutorial, hint, accessibility, other]
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        clientTimestampMs:
          type: integer
          format: int64

    FeedbackResult:
      type: object
      properties:
        feedbackId:
          type: string
        recordedAt:
          type: string
          format: date-time
        triageStatus:
          type: string

    # ---- M09 AudioSettings ----
    AudioSettings:
      type: object
      description: 音频设置 (09 §1.1 9 类)
      properties:
        masterVolume:
          type: number
          format: float
          minimum: 0
          maximum: 1
          default: 0.8
        switchSfxDb:
          type: number
          format: float
          minimum: -18
          maximum: -6
          default: -12
          description: A1 切换音 (09 §1.2)
        resetSfxDb:
          type: number
          format: float
          minimum: -24
          maximum: -12
          default: -18
          description: A2 重置音 (09 §1.3)
        winSfxDb:
          type: number
          format: float
          minimum: -12
          maximum: -3
          default: -6
          description: A3 通关音 (09 §1.4)
        errorSfxDb:
          type: number
          format: float
          minimum: -18
          maximum: -6
          default: -12
          description: A4 错音 (09 §1.5)
        tutorialSfxDb:
          type: number
          format: float
          minimum: -15
          maximum: -6
          default: -9
          description: A5 教学音 (09 §1.6)
        chapterBgmVolume:
          type: number
          format: float
          minimum: 0
          maximum: 1
          default: 0.6
          description: A6 章节 BGM
        roomThemeVolume:
          type: number
          format: float
          minimum: 0
          maximum: 1
          default: 0.5
          description: A7 房间主题
        ambientVolume:
          type: number
          format: float
          minimum: 0
          maximum: 1
          default: 0.4
          description: A8 环境音
        uiFeedbackDb:
          type: number
          format: float
          minimum: -24
          maximum: -6
          default: -15
          description: A9 UI 反馈音
        muted:
          type: boolean
          default: false

    # ---- M10 AccessibilitySettings ----
    AccessibilitySettings:
      type: object
      description: 无障碍设置 (06 §10 + 08 §6)
      properties:
        colorblindMode:
          type: string
          enum: [default, red_green, full]
          default: default
          description: 色盲 3 档 (06 §10.1)
        fontScale:
          type: number
          format: float
          enum: [1.0, 1.25, 1.5]
          default: 1.0
          description: 字号 3 档 (06 §10.2)
        controllerSupport:
          type: string
          enum: [xbox, ps, switch_pro, generic]
          default: xbox
          description: 控制器 (06 §10.3)
        difficulty:
          type: string
          enum: [easy, normal]
          default: normal
          description: 难度选项 v1.0 仅两档 (06 §10.4)
        highContrast:
          type: boolean
          default: false
          description: 高对比度
        reducedMotion:
          type: boolean
          default: false
          description: 减弱动效
        screenReader:
          type: boolean
          default: false
          description: 屏幕阅读器 (v1.1)

    # ---- M11 SaveData ----
    SaveData:
      type: object
      description: 完整存档 (04 §10.2)
      required: [version, lastUpdated, currentChapterId, currentRoomId, completedRooms, chapterCompleted, gameCompleted]
      properties:
        version:
          type: string
          example: "1.0.0"
        lastUpdated:
          type: string
          format: date-time
        currentChapterId:
          type: string
          enum: [ch1, ch2, ch3]
        currentRoomId:
          type: string
          example: "1-3"
        completedRooms:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            ch1: ["1-1", "1-2"]
            ch2: []
            ch3: []
        chapterCompleted:
          type: object
          additionalProperties:
            type: boolean
          example:
            ch1: false
            ch2: false
            ch3: false
        gameCompleted:
          type: boolean
          default: false
        totalPlayTime:
          type: integer
          example: 1800
        totalResets:
          type: integer
          example: 5
        roomStats:
          type: object
          additionalProperties:
            type: object
            properties:
              attempts:
                type: integer
              resets:
                type: integer
              completionTime:
                type: integer
              hintsTriggered:
                type: integer
            example:
              "1-1":
                attempts: 1
                resets: 0
                completionTime: 95
                hintsTriggered: 0
        accessibilitySettings:
          $ref: '#/components/schemas/AccessibilitySettings'
        audioSettings:
          $ref: '#/components/schemas/AudioSettings'

    SaveResult:
      type: object
      properties:
        saveId:
          type: string
        savedAt:
          type: string
          format: date-time
        bytesWritten:
          type: integer
        backupId:
          type: string
          nullable: true

    SaveLoadResult:
      type: object
      properties:
        saveData:
          $ref: '#/components/schemas/SaveData'
        backupAvailable:
          type: boolean
        backupTimestamp:
          type: string
          format: date-time
          nullable: true

    # ---- M12 TelemetryEvent ----
    TelemetryEvent:
      type: object
      description: 遥测事件 (05 §4.1 4 指标)
      required: [eventType, timestampMs]
      properties:
        eventType:
          type: string
          enum: [room_entered, room_completed, room_reset, slot_switched, hint_triggered, achievement_unlocked, error, performance_metric]
        roomId:
          type: string
        slotId:
          type: string
        timestampMs:
          type: integer
          format: int64
        properties:
          type: object
          additionalProperties: true
          example:
            durationSec: 95
            switchCount: 3
            resetCount: 0

    TelemetryRequest:
      type: object
      required: [sessionId, events]
      properties:
        sessionId:
          type: string
        events:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/TelemetryEvent'

    TelemetryResult:
      type: object
      properties:
        received:
          type: integer
        deduplicated:
          type: integer
        serverTimestamp:
          type: string
          format: date-time

    # ---- 衍生模型 ----
    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        playerId:
          type: string
        displayName:
          type: string
        score:
          $ref: '#/components/schemas/Score'
        completionDate:
          type: string
          format: date-time

    LeaderboardResult:
      type: object
      properties:
        chapterId:
          type: string
          nullable: true
        difficultyMax:
          type: integer
        sortBy:
          type: string
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardEntry'
        totalEntries:
          type: integer

    HintRequest:
      type: object
      required: [sessionId, roomId, trigger]
      properties:
        sessionId:
          type: string
        roomId:
          type: string
        hintLevel:
          type: integer
          minimum: 1
          maximum: 3
          default: 1
        trigger:
          type: string
          enum: [idle_timeout, user_requested, boss_20min, retry_threshold]
        idleDurationSec:
          type: integer

    HintResult:
      type: object
      properties:
        hintId:
          type: string
        level:
          type: integer
        text:
          type: string
        visualHint:
          type: string
          description: UI 提示 sprite 资源 ID
        audioAsset:
          type: string
        expiresAt:
          type: string
          format: date-time

    SyncRequest:
      type: object
      required: [playerId, sourcePlatform, saveData, clientTimestampMs]
      properties:
        playerId:
          type: string
        sourcePlatform:
          type: string
          enum: [steam, mac, ps5, xbox, switch, ios, android]
        targetPlatform:
          type: string
          enum: [steam, mac, ps5, xbox, switch, ios, android]
        saveData:
          $ref: '#/components/schemas/SaveData'
        clientTimestampMs:
          type: integer
          format: int64

    SyncResult:
      type: object
      properties:
        conflictDetected:
          type: boolean
        resolvedSave:
          $ref: '#/components/schemas/SaveData'
        lastSyncAt:
          type: string
          format: date-time

    SyncConflict:
      type: object
      properties:
        conflictDetected:
          type: boolean
          example: true
        resolution:
          type: string
          enum: [server_wins, client_wins, merged]
        serverTimestamp:
          type: string
          format: date-time
        clientTimestamp:
          type: string
          format: date-time
        lostProgress:
          $ref: '#/components/schemas/SaveData'

    # ---- 错误响应 ----
    ErrorResponse:
      type: object
      required: [errorCode, message]
      properties:
        errorCode:
          type: string
          description: |
            错误码 (详见 design/api/error-codes.md)。
            命名规范：<DOMAIN>_<REASON>，全大写下划线。
          example: "BAD_REQUEST"
        message:
          type: string
          description: 人类可读错误描述 (i18n key)
        field:
          type: string
          description: 哪个字段出错
        retryAfterMs:
          type: integer
          description: 客户端重试等待毫秒数
        currentValue:
          description: 当前值
        minValue:
          description: 最小允许值
        maxValue:
          description: 最大允许值
        limit:
          type: integer
        windowSec:
          type: integer
        currentCount:
          type: integer
        currentProgress:
          type: string
        requiredProgress:
          type: string
        dependentSlotId:
          type: string
        note:
          type: string
        serverTimestamp:
          type: string
          format: date-time
        clientTimestamp:
          type: string
          format: date-time
        lostProgress:
          $ref: '#/components/schemas/SaveData'
